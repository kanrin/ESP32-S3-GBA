[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
monitor_filters = esp32_exception_decoder

lib_deps =
  bodmer/TFT_eSPI @ ^2.5.43

build_flags =
  -D USER_SETUP_LOADED=1
  -D LOAD_GLCD=1
  -D USE_HSPI_PORT=1
  -D ILI9488_DRIVER=1
  -D TFT_WIDTH=320
  -D TFT_HEIGHT=480

  -D TFT_MOSI=11
  -D TFT_MISO=13
  -D TFT_SCLK=12
  -D TFT_CS=10
  -D TFT_DC=9
  -D TFT_RST=14
  -D TFT_BL=21

  -D SPI_FREQUENCY=10000000
  -D SPI_READ_FREQUENCY=5000000
  -D TFT_RGB_ORDER=TFT_RGB

  # VBA emulator defines
  -D LOAD_FROM_MEMORY=1
  -D HAVE_HLE_BIOS=1
  -D USE_TWEAKS=1
  -D USE_FRAME_SKIP=0
  -D THREADED_RENDERER=0
  -D USE_MOTION_SENSOR=0
  -D USE_CHEATS=0
  -D USE_SWITICKS=0
  -D FRONTEND_SUPPORTS_RGB565=1

